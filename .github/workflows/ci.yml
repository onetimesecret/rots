name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --extra test

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ \
            --ignore=tests/integration \
            --cov=rots \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Check per-file coverage minimums
        run: |
          # cli.py: baseline 26% (target: 80% — add tests for subcommand registration)
          uv run python -m coverage report \
            --include="*/rots/cli.py" \
            --fail-under=26
          # commands/db.py: baseline 29% (target: 70% — add tests for deploy history queries)
          uv run python -m coverage report \
            --include="*/rots/commands/db.py" \
            --fail-under=29

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  integration:
    # Integration smoke tests run on ubuntu-latest where systemd and podman
    # are available. Tests skip gracefully when prerequisites are absent.
    # This job is allowed to fail without blocking the PR (continue-on-error).
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --frozen --extra test

      - name: Install Podman
        run: sudo apt-get update && sudo apt-get install -y podman

      - name: Run quadlet generator validation
        run: |
          uv run pytest tests/test_quadlet_schema.py -m integration -v \
            --tb=short --no-header

      - name: Run integration smoke tests
        run: |
          uv run pytest tests/integration/ -v \
            --tb=short \
            --no-header

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run ruff linter
        run: uv run ruff check src/

      - name: Run ruff formatter check
        run: uv run ruff format --check src/

      - name: Run pyright
        run: uv run pyright src/
